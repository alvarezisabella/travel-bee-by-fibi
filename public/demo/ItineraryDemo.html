<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@700;800&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bee:#F5C300;--bee-dark:#C8960A;
  --ink:#111;--ink2:#444;--ink3:#777;--ink4:#bbb;
  --white:#fff;--page:#F0EEE8;--border:#E5E2D8;--border2:#D0CCC0;
  --green:#16A34A;--green-bg:#DCFCE7;--green-text:#15803D;
  --amber-bg:#FEF3C7;--amber-text:#92400E;
  --gray-bg:#F3F4F6;--gray-text:#4B5563;
  --act-bg:#DCFCE7;--act-text:#166534;
  --res-bg:#FCE7F3;--res-text:#9D174D;
  --food-bg:#FCE7F3;--food-text:#9D174D;
  --transit-bg:#DBEAFE;--transit-text:#1E40AF;
}
body{font-family:'Inter',sans-serif;background:transparent;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 2rem;}
.laptop{width:100%;max-width:960px;display:flex;flex-direction:column;align-items:center;}
.laptop-screen{width:100%;background:#1a1a1a;border-radius:14px 14px 0 0;padding:12px 12px 0;box-shadow:0 0 0 1px #333,0 20px 60px rgba(0,0,0,0.8);}
.laptop-base{width:110%;background:linear-gradient(180deg,#2a2a2a,#1a1a1a);height:18px;border-radius:0 0 8px 8px;box-shadow:0 4px 16px rgba(0,0,0,0.6);}
.laptop-base-foot{width:90%;height:6px;background:#111;border-radius:0 0 6px 6px;margin:0 auto;}
.browser{width:100%;border-radius:8px 8px 0 0;overflow:hidden;}
.bbar{background:#2d2d2d;padding:0.45rem 0.75rem;display:flex;align-items:center;gap:0.55rem;}
.bdots{display:flex;gap:4px;}
.bdot{width:9px;height:9px;border-radius:50%;}
.burl{flex:1;background:#1a1a1a;border-radius:4px;padding:0.2rem 0.6rem;font-size:0.62rem;color:#888;display:flex;align-items:center;gap:4px;max-width:420px;margin:0 auto;font-family:inherit;}
.vp-outer{width:100%;overflow:hidden;}
.vp-inner{width:1280px;height:720px;transform-origin:top left;position:relative;background:var(--page);display:flex;flex-direction:row;}
.site-nav{position:absolute;top:0;left:0;right:0;height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 2rem;z-index:20;}
.site-logo{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.15rem;color:var(--ink);display:flex;align-items:center;gap:3px;}
.site-nav-links{display:flex;gap:2rem;}
.site-nav-links a{font-size:0.88rem;color:var(--ink3);text-decoration:none;font-weight:500;}
.nav-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--border);flex-shrink:0;}
.atlas-col{width:320px;min-width:320px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;margin-top:52px;height:668px;transition:width 0.32s cubic-bezier(0.22,1,0.36,1),min-width 0.32s;overflow:hidden;position:relative;z-index:10;flex-shrink:0;}
.atlas-col.closed{width:0;min-width:0;}
.atlas-toggle{position:absolute;top:calc(52px + 50%);left:320px;transform:translateY(-50%);width:18px;height:36px;background:var(--white);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:25;transition:left 0.32s cubic-bezier(0.22,1,0.36,1);}
.atlas-toggle.shut{left:0;}
.atlas-toggle svg{width:10px;height:10px;color:var(--ink3);transition:transform 0.25s;}
.atlas-toggle.shut svg{transform:rotate(180deg);}
.atlas-inner{display:flex;flex-direction:column;height:100%;min-width:320px;}
.atlas-hdr{padding:0.65rem 1rem;border-bottom:1px solid var(--border);}
.atlas-hdr-title{font-size:0.88rem;font-weight:600;color:var(--ink);}
.atlas-msgs{flex:1;overflow-y:auto;padding:0.75rem 0.85rem;display:flex;flex-direction:column;gap:0.5rem;}
.atlas-msgs::-webkit-scrollbar{width:3px;}
.atlas-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.msg-usr{background:#3B82F6;color:#fff;border-radius:10px 10px 2px 10px;padding:0.5rem 0.7rem;font-size:0.78rem;line-height:1.5;align-self:flex-end;max-width:86%;}
.msg-usr-time{font-size:0.62rem;color:rgba(255,255,255,0.55);text-align:right;margin-top:2px;}
.msg-bot{background:var(--white);border:1px solid var(--border);border-radius:2px 10px 10px 10px;padding:0.5rem 0.7rem;font-size:0.78rem;line-height:1.55;color:var(--ink2);align-self:flex-start;max-width:96%;}
.msg-bot strong{color:var(--ink);font-weight:600;}
.tips-item{font-size:0.73rem;color:var(--ink2);line-height:1.6;display:flex;gap:5px;}
.tips-item::before{content:'✅';font-size:10px;flex-shrink:0;}
.tips-item.warn::before{content:'⚠️';}
.tips-followup{font-size:0.73rem;color:var(--ink2);margin-top:0.4rem;font-style:italic;}
.typing-bub{background:var(--white);border:1px solid var(--border);border-radius:2px 10px 10px 10px;padding:0.5rem 0.7rem;align-self:flex-start;display:flex;gap:3px;align-items:center;}
.td{width:6px;height:6px;background:var(--ink4);border-radius:50%;animation:bl 1.1s infinite;}
.td:nth-child(2){animation-delay:.18s;}
.td:nth-child(3){animation-delay:.36s;}
@keyframes bl{0%,60%,100%{opacity:.2;}30%{opacity:1;}}
.atlas-inp-row{border-top:1px solid var(--border);padding:0.55rem 0.6rem;display:flex;gap:0.35rem;align-items:center;}
.atlas-inp{flex:1;border:1px solid var(--border);border-radius:20px;padding:0.42rem 0.7rem;font-size:0.75rem;color:var(--ink);font-family:inherit;outline:none;}
.atlas-inp-send{background:none;border:none;cursor:pointer;color:var(--ink3);padding:0.15rem;display:flex;}
.atlas-inp-send svg{width:16px;height:16px;}
.main-col{flex:1;overflow:hidden;position:relative;margin-top:52px;height:668px;}
.sc{position:absolute;top:0;left:0;right:0;will-change:transform;}
.banner{height:200px;position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:0.75rem 1.5rem;}
.banner-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 40%;}
.banner-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.4));}
.banner-change{position:relative;z-index:2;background:rgba(255,255,255,0.92);border:none;border-radius:5px;padding:0.22rem 0.6rem;font-size:0.7rem;font-weight:500;color:var(--ink);cursor:pointer;}
.trip-hdr{background:var(--white);padding:1rem 1.75rem 0.75rem;border-bottom:1px solid var(--border);}
.trip-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;}
.trip-name{font-family:'Raleway',sans-serif;font-weight:800;font-size:1.5rem;color:var(--ink);}
.trip-btns{display:flex;gap:0.5rem;}
.tbtn{display:flex;align-items:center;gap:5px;padding:0.4rem 1rem;border:none;border-radius:100px;background:var(--bee);font-size:0.8rem;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;}
.trip-meta{display:flex;gap:1.25rem;font-size:0.78rem;color:var(--ink3);margin-bottom:0.6rem;}
.trip-meta span{display:flex;align-items:center;gap:4px;}
.trip-toolbar{display:flex;gap:1rem;padding-top:0.5rem;border-top:1px solid var(--border);}
.ttool{color:var(--ink3);font-size:0.85rem;cursor:pointer;}
.days{padding:1.25rem 1.75rem;display:flex;flex-direction:column;gap:1.1rem;}
.day-block{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.day-lbl{font-family:'Raleway',sans-serif;font-size:1.6rem;font-weight:800;color:var(--ink);padding:1.1rem 1.4rem 0.5rem;}
.ev{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--bee);border-radius:9px;margin:0 1.1rem 0.7rem;padding:0.8rem 1rem;}
.ev-top{display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;margin-bottom:0.32rem;}
.ev-name{font-size:0.92rem;font-weight:600;color:var(--ink);flex:1;}
.ev-rhs{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.ev-votes{display:flex;gap:6px;font-size:0.75rem;color:var(--ink3);}
.ev-vote{display:flex;align-items:center;gap:2px;}
.ev-vote svg{width:12px;height:12px;}
.badge{font-size:0.68rem;font-weight:700;padding:0.2rem 0.7rem;border-radius:100px;}
.badge.pending{background:var(--amber-bg);color:var(--amber-text);}
.badge.confirmed{background:var(--green-bg);color:var(--green-text);}
.badge.idea{background:var(--gray-bg);color:var(--gray-text);}
.ev-tag{display:inline-flex;align-items:center;gap:3px;font-size:0.68rem;font-weight:500;padding:0.16rem 0.55rem;border-radius:100px;margin-bottom:0.28rem;}
.ev-tag.activity{background:var(--act-bg);color:var(--act-text);}
.ev-tag.reservation{background:var(--res-bg);color:var(--res-text);}
.ev-tag.food{background:var(--food-bg);color:var(--food-text);}
.ev-tag.transit{background:var(--transit-bg);color:var(--transit-text);}
.tag-dot{width:6px;height:6px;border-radius:50%;}
.ev-meta{font-size:0.72rem;color:var(--ink3);margin-bottom:0.22rem;}
.ev-timerow{font-size:0.72rem;color:var(--ink3);display:flex;gap:0.75rem;}
.add-ev{display:inline-flex;align-items:center;gap:4px;margin:0 1.1rem 0.9rem;padding:0.32rem 1rem;border:1.5px solid var(--bee);background:transparent;border-radius:100px;font-size:0.75rem;font-weight:600;color:var(--bee-dark);cursor:pointer;font-family:inherit;}
.fi{opacity:0;transform:translateY(8px);transition:opacity 0.38s cubic-bezier(0.22,1,0.36,1),transform 0.38s cubic-bezier(0.22,1,0.36,1);}
.fi.in{opacity:1;transform:translateY(0);}
.si{opacity:0;transform:translateX(-8px);transition:opacity 0.35s cubic-bezier(0.22,1,0.36,1),transform 0.35s cubic-bezier(0.22,1,0.36,1);}
.si.in{opacity:1;transform:translateX(0);}
.bi{transform:scale(0.6);opacity:0;transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1),opacity 0.28s;}
.bi.in{transform:scale(1);opacity:1;}
.cursor{position:absolute;pointer-events:none;z-index:50;transition:top 0.5s cubic-bezier(0.22,1,0.36,1),left 0.5s cubic-bezier(0.22,1,0.36,1);filter:drop-shadow(0 2px 3px rgba(0,0,0,0.3));}
.cursor svg{width:18px;height:18px;}
.cring{position:absolute;top:50%;left:50%;width:28px;height:28px;border-radius:50%;border:2px solid rgba(245,195,0,0.85);transform:translate(-50%,-50%) scale(0);opacity:0;}
.cring.pop{animation:cr 0.38s ease-out forwards;}
@keyframes cr{0%{transform:translate(-50%,-50%) scale(0);opacity:0.9;}100%{transform:translate(-50%,-50%) scale(1.8);opacity:0;}}
</style>

  <button id="rb" style="display:flex;align-items:center;gap:5px;padding:0.38rem 0.9rem;border-radius:100px;border:1.5px solid #D0CCC0;background:transparent;color:#777;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:inherit;">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3"/></svg>
    Replay

<script>
document.getElementById("nyc-img").src = "/images/clip_nyc_cover_photo.jpg";
function applyScale(){
  const outer=document.getElementById('vpo');
  const inner=document.getElementById('vpi');
  const scale=outer.offsetWidth/1280;
  inner.style.transform=`scale(${scale})`;
  inner.style.transformOrigin='top left';
  outer.style.height=(720*scale)+'px';
}
applyScale();
window.addEventListener('resize',applyScale);

const sc=document.getElementById('sc'),dw=document.getElementById('dw'),ap=document.getElementById('ap'),tog=document.getElementById('tog'),amsgs=document.getElementById('amsgs'),ainp=document.getElementById('ainp'),cur=document.getElementById('cur'),cr=document.getElementById('cr');
tog.onclick=()=>{const c=ap.classList.toggle('closed');tog.classList.toggle('shut',c);tog.style.left=c?'0':'320px';};
const delay=ms=>new Promise(r=>setTimeout(r,ms));
const moveCur=(x,y)=>{cur.style.left=x+'px';cur.style.top=y+'px';};
async function clickAt(x,y){moveCur(x,y);await delay(550);cr.className='cring';void cr.offsetWidth;cr.className='cring pop';await delay(360);}
function smoothScroll(to,dur=650){
  return new Promise(res=>{
    const from=-parseInt((sc.style.transform||'translateY(0)').replace(/[^\d.-]/g,'')||0);
    const diff=to-from;let t0=null;
    const ease=t=>t<.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;
    const step=ts=>{if(!t0)t0=ts;const p=Math.min((ts-t0)/dur,1);sc.style.transform=`translateY(${-(from+diff*ease(p))}px)`;p<1?requestAnimationFrame(step):res();};
    requestAnimationFrame(step);
  });
}
async function typeIn(text){ainp.value='';for(const ch of text){ainp.value+=ch;await delay(36+Math.random()*18);}await delay(220);}
function mkTyping(){const e=document.createElement('div');e.className='typing-bub';e.innerHTML='<div class="td"></div><div class="td"></div><div class="td"></div>';return e;}
async function addMsg(html,role,td=1000){
  if(role==='bot'){const t=mkTyping();amsgs.appendChild(t);amsgs.scrollTop=9999;await delay(td);t.remove();}
  const m=document.createElement('div');m.className=role==='usr'?'msg-usr':'msg-bot';m.innerHTML=html;
  if(role==='usr'){const ts=document.createElement('div');ts.className='msg-usr-time';ts.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});m.appendChild(ts);}
  amsgs.appendChild(m);amsgs.scrollTop=9999;await delay(30);
}
function mkTag(type){const cols={activity:'#16A34A',reservation:'#9D174D',food:'#9D174D',transit:'#1E40AF'};const e=document.createElement('span');e.className=`ev-tag ${type}`;const d=document.createElement('span');d.className='tag-dot';d.style.background=cols[type]||'#888';e.appendChild(d);e.appendChild(document.createTextNode(type[0].toUpperCase()+type.slice(1)));return e;}
function mkEv(ev){
  const c=document.createElement('div');c.className='ev si';const uid=ev.name.replace(/\W/g,'');
  c.innerHTML=`<div class="ev-top"><div class="ev-name">${ev.name}</div><div class="ev-rhs"><div class="ev-votes"><span class="ev-vote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/></svg>0</span><span class="ev-vote"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/></svg>0</span></div><span class="badge ${ev.status} bi" id="b${uid}">${ev.status[0].toUpperCase()+ev.status.slice(1)}</span></div></div>`;
  c.appendChild(mkTag(ev.tag));
  if(ev.desc){const d=document.createElement('div');d.className='ev-meta';d.textContent=ev.desc;c.appendChild(d);}
  const tr=document.createElement('div');tr.className='ev-timerow';tr.innerHTML=`<span>${ev.time}</span><span>${ev.dur}</span>`;c.appendChild(tr);return c;
